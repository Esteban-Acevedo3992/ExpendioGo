{% load static %}
<!DOCTYPE html >
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel - ExpendioGo</title>
  <link rel="stylesheet" href="{% static 'styles.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<header class="header">
  <div class="logo-box">
    <img src="{% static '_img/logo.png' %}" alt="Logo" class="logo-header">
 </div>
 <h1>ExpendioGo</h1>
  <button class="logout-btn" onclick="window.location.href='{% url 'logout' %}'">
    <i class="fas fa-sign-out-alt"></i> Cerrar sesión
    
</header>

<body>

  <div class="dashboard">
    <aside class="sidebar">
      
      <nav>
        <a href="/dashboard/" class="{% if request.path == '/dashboard/' %}activo{% endif %}">
          <i class="fas fa-house" style="color: #DD3B3B;"></i> Inicio
        </a>
        <a href="/dashboard/" class="{% if request.path == '/inventory/' %}activo{% endif %}">
          <i class="fas fa-box"></i> Inventario
        </a>
        <a href="/dashboard/" class="{% if request.path == '/orders/' %}activo{% endif %}">
          <i class="fas fa-shopping-cart"></i> Pedidos
        </a>
        <a href="/dashboard/" class="{% if request.path == '/finances/' %}activo{% endif %}">
          <i class="fas fa-money-bill"></i>  Finanzas
        </a>
        <a href="/dashboard/" class="{% if request.path == '/settings/' %}activo{% endif %}">
          <i class="fas fa-cog"></i> Configuración
        </a>
      </nav>
    </aside>

    <main class="content">

      <section class="cards">
        <div class="info-card">
          <h3>Ventas del día</h3>
          <p>$720.50 MXN</p>
        </div>

        <div class="info-card">
          <h3>Pedidos pendientes</h3>
          <p>5 pedidos</p>
        </div>

        <div class="info-card">
          <h3>Productos bajos</h3>
          <p>3 productos</p>
        </div>
      </section>

      <section class="chart-box">
        <h2>Ventas de la semana</h2>

        <div class="fake-chart">
          <div style="height: 45%;"></div>
          <div style="height: 65%;"></div>
          <div style="height: 35%;"></div>
          <div style="height: 55%;"></div>
          <div style="height: 75%;"></div>
          <div style="height: 90%;"></div>
        </div>
      </section>
    </main>
  </div>

</body>
</html>
