{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ExpendioGo</title>
  <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body>

  <main class="login-page">
    <section class="login-card">

      <div class="logo-box">
        <img src="{% static '_img/logo.png' %}" alt="Logo ExpendioGo" class="logo">
      </div>

      <h1>Recuperar Contraseña</h1>
      <h3>Ingresa tu correo electrónico para recuperar tu contraseña</h3>


        <form method="POST">
        {% csrf_token %} <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" required>

        <div class="buttons">
            <button type="button" class="btn salir" onclick="window.location.href='{% url 'login' %}'">Salir</button>
            
            <button type="submit" class="btn iniciar">Recuperar</button>
        </div>

        {% if mensaje %}
            <p style="color: green; text-align: center;">{{ mensaje }}</p>
        {% endif %}
        </form>

    </section>
  </main>

</body>
</html>
